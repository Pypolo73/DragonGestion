name: AdminCore
version: 1.1.54
main: fr.dragon.admincore.core.AdminCorePlugin
api-version: "1.21"
author: OpenAI
description: Plugin staff modulaire Paper 1.21.8 avec compatibilite StaffPlusPlus API
softdepend:
  - AxInventoryRestore
  - LuckPerms

commands:
  report:
    description: Creer un ticket de report
    usage: /report <joueur>
  ticket:
    description: Voir et repondre a ses tickets
    usage: /ticket <list|reply>
  staffticket:
    description: Gestion staff des tickets
    usage: /staffticket <list|view|assign|close|archive|history>
    aliases: [tickets]
    permission: admincore.staffticket
  stafflogs:
    description: Voir les actions staff
    usage: /stafflogs [staff]
    permission: admincore.stafflogs
  tempban:
    description: Ban temporaire
    usage: /tempban <joueur> [duree] [raison]
    permission: admincore.tempban
  tempmute:
    description: Mute temporaire
    usage: /tempmute <joueur> [duree] [raison]
    permission: admincore.tempmute
  ban:
    description: Ban permanent
    usage: /ban <joueur> [raison]
    permission: admincore.ban
  mute:
    description: Mute permanent
    usage: /mute <joueur> [raison]
    permission: admincore.mute
  unban:
    description: Deban un joueur
    usage: /unban <joueur>
    permission: admincore.unban
  unmute:
    description: Demute un joueur
    usage: /unmute <joueur>
    permission: admincore.unmute
  kick:
    description: Kick un joueur
    usage: /kick <joueur> [raison]
    permission: admincore.kick
  warn:
    description: Avertir un joueur
    usage: /warn <joueur> [raison]
    permission: admincore.warn
  warnings:
    description: Voir les warnings
    usage: /warnings <joueur>
    permission: admincore.warnings
  clearwarns:
    description: Effacer les warnings
    usage: /clearwarns <joueur>
    permission: admincore.clearwarns
  clearchat:
    description: Nettoyer le chat
    usage: /clearchat [type]
    permission: admincore.clearchat
  chat:
    description: Gestion rapide du chat
    usage: /chat <clear|slowmode|lock|muteall|broadcast>
  slowmode:
    description: Activer le slowmode
    usage: /slowmode <secondes|off>
    permission: admincore.slowmode
  chatlock:
    description: Verrouiller le chat
    usage: /chatlock
    permission: admincore.chatlock
  muteall:
    description: Couper tout le chat
    usage: /muteall
    permission: admincore.muteall
  broadcast:
    description: Broadcast staff
    usage: /broadcast <message>
    permission: admincore.broadcast
  staffmode:
    description: Basculer en staffmode
    usage: /staffmode
    permission: admincore.staffmode
  staff:
    description: Gestion du staff et des validations
    usage: /staff <add|remove|list|pending|approve|deny>
    permission: admincore.staff
  vanish:
    description: Vanish
    usage: /vanish [joueur]
    permission: admincore.vanish
  freeze:
    description: Freeze un joueur
    usage: /freeze <joueur>
    permission: admincore.freeze
  spy:
    description: Social spy
    usage: /spy
    permission: admincore.spy
  invsee:
    description: Voir un inventaire
    usage: /invsee <joueur>
    permission: admincore.invsee
  stafflist:
    description: Liste le staff
    usage: /stafflist
    permission: admincore.stafflist
  history:
    description: Historique d'un joueur
    usage: /history <joueur>
    permission: admincore.history
  lookup:
    description: Lookup joueur ou ip
    usage: /lookup <joueur|ip>
    permission: admincore.lookup
  alts:
    description: Chercher les alts
    usage: /alts <joueur>
    permission: admincore.alts
  note:
    description: Ajouter une note
    usage: /note <joueur> <texte>
    permission: admincore.note
  notes:
    description: Voir les notes
    usage: /notes <joueur>
    permission: admincore.notes
  ipban:
    description: IP ban
    usage: /ipban <joueur|ip>
    permission: admincore.ipban
  checkvpn:
    description: Verifier un VPN
    usage: /checkvpn <joueur|ip>
    permission: admincore.checkvpn
  network:
    description: Commandes reseau et securite
    usage: /network <info|geo|reload>
    aliases: [net]
    permission: admincore.network
  admincore:
    description: Administration plugin
    usage: /admincore <reload|debug|db export|pending|approve|deny>
    permission: admincore.admin
  inventory:
    description: Voir ou modifier l'inventaire d'un joueur
    usage: /inventory <joueur>
    aliases: [inv, inventaire]
    permission: admincore.inventory.view
  sethome:
    description: Creer un home
    usage: /sethome [nom]
  home:
    description: Se teleporter a un home
    usage: /home [nom]
  delhome:
    description: Supprimer un home
    usage: /delhome <nom>
  listhomes:
    description: Liste vos homes
    usage: /listhomes
    aliases: [homes]
  setwarp:
    description: Creer un warp
    usage: /setwarp <nom> [description]
    permission: admincore.teleport.warp.create
  warp:
    description: Se teleporter a un warp
    usage: /warp [nom]
  delwarp:
    description: Supprimer un warp
    usage: /delwarp <nom>
    permission: admincore.teleport.warp.delete
  listwarps:
    description: Liste les warps
    usage: /listwarps
    aliases: [warps]
  spawn:
    description: Se teleporter au spawn
    usage: /spawn
  setspawn:
    description: Definir le spawn
    usage: /setspawn
    permission: admincore.teleport.spawn.set
  rtp:
    description: Teleportation aleatoire
    usage: /rtp
    permission: admincore.teleport.rtp
  tpa:
    description: Demander a se teleporter vers un joueur
    usage: /tpa <joueur>
  tpahere:
    description: Demander a un joueur de se teleporter sur vous
    usage: /tpahere <joueur>
  tpaccept:
    description: Accepter une requete de teleportation
    usage: /tpaccept [joueur]
  tpdeny:
    description: Refuser une requete de teleportation
    usage: /tpdeny [joueur]
  tpignore:
    description: Ignorer/Accepter les requetes
    usage: /tpignore
  back:
    description: Retour a la position precedente
    usage: /back
  teleportation:
    description: Menu de teleportation
    usage: /teleportation
    aliases: [teleport]
    permission: admincore.teleportation
  teleport:
    description: Menu de teleportation (alias)
    usage: /teleportation
    aliases: [tp]
  fly:
    description: Activer/desactiver le mode fly
    usage: /fly [joueur]
    permission: admincore.fly
  flyspeed:
    description: Regler la vitesse de vol
    usage: /flyspeed [joueur] [1-10]
    permission: admincore.flyspeed

