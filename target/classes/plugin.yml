      admincore.stafflist: true
      admincore.history: true
      admincore.lookup: true
      admincore.alts: true
      admincore.note: true
      admincore.notes: true
      admincore.ipban: true
      admincore.checkvpn: true
      admincore.network: true
      admincore.alerts: true
      admincore.reports: true
      admincore.staffticket: true
      admincore.inventory.view: true
      admincore.inventory.edit: true
      admincore.inventory.backup: true
      admincore.stafflogs: true
      admincore.fly: true
      admincore.flyspeed: true
      admincore.admin: true
      admincore.chat.bypass: true
      admincore.freeze.bypass: true
      admincore.vanish.see: true
  admincore.staff:
    default: op
  admincore.tempban:
    default: op
  admincore.tempmute:
    default: op
  admincore.ban:
    default: op
