# Configuration d'affichage du module InventoryManager pour les backups.
# La capture et le stockage reels restent geres par AxInventoryRestore.

# Si false, le bouton Backups reste inaccessible dans le module.
enabled: true

# Duree de retention affichee dans le GUI.
# Mets -1 pour un affichage illimite.
retention-days: -1

# Nombre maximum de snapshots par joueur affiche dans le GUI.
# Mets -1 pour un affichage illimite.
max-snapshots-per-player: -1

# Triggers affiches dans le GUI comme metadonnees.
# Active seulement ceux que tu consideres utilises par AxInventoryRestore.
triggers:
  death: true
  join: true
  world-change: true
  container-close: true
  ender-chest: true
  quit: false
  gamemode-change: false
