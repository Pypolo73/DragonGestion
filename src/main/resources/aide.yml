# Fichier d'aide genere avec le plugin.
# Il n'est pas lu par le code: il sert uniquement de documentation visible
# dans le dossier AdminCore.

plugin:
  nom: "AdminCore"
  version: "Consulter plugin.yml ou le nom du jar"
  resume: "Plugin staff Paper 1.21.8 pour la moderation, le staffmode, le chat, les tickets, les lookups et la gestion d'inventaire."

fichiers:
  config.yml: "Configuration principale: sanctions, chat, alerts, dialogs, reseau, staff, voice chat et autres reglages."
  messages.yml: "Messages MiniMessage affiches en jeu."
  inventorybackup.yml: "Infos d'affichage pour le module inventory backup."
  aide.yml: "Ce fichier d'aide."

modules:
  sanctions:
    description: "Module principal de moderation."
    commandes:
      - "/ban <joueur> [raison]"
      - "/tempban <joueur> [duree] [raison]"
      - "/mute <joueur> [raison]"
      - "/tempmute <joueur> [duree] [raison]"
      - "/kick <joueur> [raison]"
      - "/warn <joueur> [raison]"
      - "/unban <joueur>"
      - "/unmute <joueur>"
      - "/warnings <joueur>"
      - "/clearwarns <joueur>"
      - "/ipban <joueur|ip>"
    fonctionnement:
      - "Les sanctions peuvent utiliser des raisons et durees predefinies."
      - "Les durees temporaires utilisent des formats comme 30m, 1h, 7d, 1mo."
      - "Les confirmations peuvent choisir comment afficher l'auteur: decision staff, non precise, ou nom du moderateur."
      - "Selon la config, ban et tempban peuvent aussi lier l'IP."
      - "Selon la config, mute et tempmute peuvent aussi se synchroniser avec le voice chat."
      - "Le message de ban et l'ecran de kick sont configurables dans config.yml."

  reports_et_tickets:
    description: "Signalements joueurs et suivi des tickets."
    commandes_joueurs:
      - "/report <joueur>"
      - "/ticket list"
      - "/ticket reply <id>"
    commandes_staff:
      - "/staffticket list"
      - "/staffticket view <id>"
      - "/staffticket assign <id>"
      - "/staffticket close <id>"
      - "/staffticket archive <id>"
      - "/staffticket history <joueur>"
      - "/tickets ... (alias de /staffticket)"
    fonctionnement:
      - "La commande /report ouvre un flow en 3 etapes: pseudo Discord, categorie, description."
      - "Le joueur signale peut etre en ligne ou hors ligne, a condition qu'il soit deja connu du serveur."
      - "Les categories de report sont configurables dans config.yml."
      - "A la creation d'un ticket, les staffs avec la permission adequate recoivent une actionbar et un son."
      - "Les tickets utilisent les statuts OPEN, IN_PROGRESS, CLOSED et ARCHIVED."
      - "Le clic gauche staff sur un ticket ouvert l'assigne et ouvre la discussion."
      - "Le clic droit staff ouvre la cloture avec note."
      - "Shift clic droit sur un ticket ferme permet l'archivage."
      - "Le joueur reporter et le joueur cible peuvent consulter et repondre au ticket si celui-ci est encore actif."
      - "Quand le staff envoie un message, le joueur recoit un bouton [Repondre] cliquable."
      - "Quand un joueur concerne par un ticket actif se reconnecte, il recoit une notification immediate pour le reconsulter."
      - "Si possible, il faut privilegier Discord pour une meilleure facilite de traitement."

  staff:
    description: "Gestion des membres staff et des validations."
    commandes:
      - "/staff add"
      - "/staff remove"
      - "/staff list"
      - "/staff pending"
      - "/staff approve <id>"
      - "/staff deny <id>"
    fonctionnement:
      - "Le systeme gere des roles staff internes et des demandes a valider."
      - "Certaines sanctions de grande ampleur peuvent demander une validation."
      - "Les regles de validation et de hierarchie se reglent dans config.yml."

  staffmode:
    description: "Mode outils staff separe de l'inventaire normal."
    commandes:
      - "/staffmode"
      - "/freeze <joueur>"
      - "/spy"
      - "/stafflist"
      - "/vanish [joueur]"
    outils:
      - "Selection staff"
      - "Boussole de teleportation discrete"
      - "Freeze"
      - "Vanish"
      - "Observation staff"
      - "Historique joueur"
      - "Messages joueur"
      - "Monter sur la tete"
      - "Moniteur serveur"
      - "Teleportation rapide sur un joueur en vanish si necessaire"
    fonctionnement:
      - "Le mode staff sauvegarde puis restaure l'inventaire normal du joueur."
      - "Les items du staffmode servent a moderer rapidement en jeu."
      - "Le vanish masque le joueur aux personnes sans permission de vision vanish."
      - "Le moniteur serveur affiche TPS, RAM et chunks charges en actionbar."
      - "Les teleportations staff discretes sont logguees."

  gui_admincore:
    description: "Interface principale du plugin."
    commande: "/admincore"
    contenu:
      - "Sanctions actives"
      - "Historique joueur"
      - "Recherche de profils"
      - "Sanctions recentes"
      - "Tickets"
      - "Acces rapide a plusieurs menus staff"
    fonctionnement:
      - "Permet d'ouvrir differents menus de moderation."
      - "L'onglet Tickets affiche les tickets ouverts et en cours."
      - "Des vues separees existent pour les tickets fermes et les archives."

  inventory:
    description: "Visualisation, modification et backups des inventaires."
    commande: "/inventory <joueur>"
    modes:
      - "Voir"
      - "Modifier"
      - "Creer un backup"
    fonctionnement:
      - "Le premier choix s'ouvre en dialog si le client supporte les dialogs Paper."
      - "Le mode Voir ouvre un inventaire en lecture seule."
      - "Le mode Modifier permet de deplacer, retirer et ajouter des items."
      - "Le bouton Shuffle melange l'inventaire normal."
      - "Le bouton Clear vide le conteneur apres confirmation."
      - "Le bouton Backups ouvre le GUI natif d'AxInventoryRestore."
      - "La creation de backup manuel passe par AxInventoryRestore."
    permissions:
      - "admincore.inventory.view"
      - "admincore.inventory.edit"
      - "admincore.inventory.backup"

  chat:
    description: "Regulation et moderation du chat."
    commandes:
      - "/chat clear"
      - "/chat clear player <joueur>"
      - "/chat clear messages"
      - "/slowmode <secondes|off>"
      - "/chatlock"
      - "/muteall"
      - "/broadcast <message>"
    fonctionnement:
      - "Peut bloquer les mots interdits."
      - "Peut imposer un delai entre deux messages."
      - "Peut bloquer le spam du meme message."
      - "Peut garder un historique recent des messages."
      - "Le nombre de messages affiches dans les menus est configurable."

  lookup_et_notes:
    description: "Outils de suivi joueur."
    commandes:
      - "/lookup <joueur|ip>"
      - "/alts <joueur>"
      - "/history <joueur>"
      - "/note <joueur> <texte>"
      - "/notes <joueur>"
    fonctionnement:
      - "Lookup ouvre un GUI avec resume joueur, historique et sessions."
      - "Le panneau principal peut afficher le temps de jeu cumule et le nombre total de sessions."
      - "Les sessions stockent IP, pseudo, serveur source, heure de connexion et deconnexion."
      - "Lookup peut aussi afficher l'IP, le client et le nombre de sanctions."
      - "Les notes staff sont stockees en base."
      - "L'historique liste les sanctions d'un joueur."

  alerts:
    description: "Alertes automatiques staff."
    fonctionnement:
      - "Surveille les warns recents, le nombre de comptes sur une meme IP et le nombre de connexions dans une fenetre de temps."
      - "Les seuils sont definis dans config.yml."
      - "Les alerts sont envoyees aux staffs avec son et message."

  stafflogs:
    description: "Journal des actions staff."
    commande: "/stafflogs [staff]"
    fonctionnement:
      - "Affiche les actions staff en GUI pagine."
      - "Peut filtrer sur un membre staff."
      - "Les actions comme sanctions, tickets, vanish, teleportations et editions LuckPerms sont logguees."

  luckperms:
    description: "Interface staff de navigation et edition LuckPerms."
    commandes:
      - "/staffluckperm"
      - "/stafflp"
    fonctionnement:
      - "Ouvre un flow Dialog pour choisir un groupe puis naviguer plugin par plugin."
      - "Chaque permission affiche un bouton de navigation a gauche et un bouton TRUE/FALSE a droite."
      - "Le bouton TRUE/FALSE bascule immediatement la valeur puis recharge la vue."
      - "Les actions disposent d'un undo, redo, save et cancel."
      - "Les modifications LuckPerms sont logguees dans staff_actions."

  vpn:
    description: "Verification VPN simple."
    commande: "/checkvpn <joueur|ip>"
    fonctionnement:
      - "Utilise une URL definie dans config.yml."
      - "Le module peut etre active ou desactive."

base_de_donnees:
  types:
    - "SQLITE"
    - "MYSQL"
  fonctionnement:
    - "Les requetes passent par HikariCP."
    - "Le schema est cree automatiquement au demarrage."
    - "Les requetes lourdes sont executees en async."
    - "Les donnees joueurs, sanctions, tickets, messages ticket, sessions, notes, alerts et logs staff sont persistantes."

softdepends:
  AxInventoryRestore: "Utilise pour les backups d'inventaire et leur GUI natif."
  LuckPerms: "Utilise pour l'interface staff de gestion des permissions."

permissions_importantes:
  - "admincore.*"
  - "admincore.staffmode"
  - "admincore.vanish"
  - "admincore.freeze"
  - "admincore.lookup"
  - "admincore.history"
  - "admincore.reports"
  - "admincore.staffticket"
  - "admincore.stafflogs"
  - "admincore.staffluckperm"
  - "admincore.inventory.view"
  - "admincore.inventory.edit"
  - "admincore.inventory.backup"

notes:
  - "Les dialogs Paper peuvent etre desactives ou contournes selon la marque du client."
  - "Le plugin sauvegarde certains fichiers par defaut au premier demarrage."
  - "Certaines integrations sont optionnelles et dependent d'autres plugins presents sur le serveur."
  - "Si un pseudo n'a jamais ete vu par le serveur, certaines recherches offline peuvent ne pas le retrouver."
