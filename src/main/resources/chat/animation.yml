# DragonGestion - Configuration des mini-jeux et animations dans le chat
# Jeux disponibles: Mots cachés et Mathématiques

# ============================================
# RÉCOMPENSES
# ============================================
rewards:
  # Activer les récompenses
  enabled: true
  
  # Récompense par défaut utilisée (nom de la récompense définie ci-dessous)
  default: "xp_default"
  
  # Liste des récompenses disponibles
  # Chaque récompense a un nom unique (clé)
  # name: type de récompense (xp, money, item, command)
  # amount: quantité
  # command: commande à exécuter (pour type command, sinon ignoré)
  
  # Récompense XP
  xp_default:
    name: "xp"
    amount: 100
    command: ""
  
  xp_500:
    name: "xp"
    amount: 500
    command: ""
  
  xp_1000:
    name: "xp"
    amount: 1000
    command: ""
  
  # Récompense Money (nécessite Vault)
  money_small:
    name: "money"
    amount: 100
    command: ""
  
  money_medium:
    name: "money"
    amount: 500
    command: ""
  
  money_big:
    name: "money"
    amount: 1000
    command: ""
  
  # Récompense Item (ItemAdder ou material vanilla)
  diamond:
    name: "item"
    amount: 1
    command: "give {player} diamond 1"
  
  gold:
    name: "item"
    amount: 10
    command: "give {player} gold_ingot 10"
  
  # Récompense Commande personnalisée
  custom_reward:
    name: "command"
    amount: 1
    command: "give {player} diamond 1;msg {player} Bravo tu as gagné un diamant!"

# ============================================
# JEUX DE MOTS
# ============================================
word-game:
  # Activer le jeu de mots
  enabled: true
  
  # Liste des mots possibles (un mot aléatoire sera choisi)
  words:
    - "Charbon"
    - "Fer"
    - "Or"
    - "Diamant"
    - "Emeraude"
    - "Redstone"
    - "Lapis"
    - "Obsidienne"
    - "Gold"
    - "Copper"
    - "Pierre"
    - "Bois"
    - "Verre"
    - "Sable"
    - "Gravier"
    - "Argile"
    - "Neige"
    - "Glace"
    - "Cobblestone"
  
  # Mode d'affichage du mot caché:
  # HYPHEN: C-h-a-r-b-o-n
  # STAR: C******
  # MIX: Mix de lettres et tirets
  display-mode: "HYPHEN"
  
  # Afficher un indice?
  show-hint: true
  # Format de l'indice: premières et dernières lettres
  # Ex: Charbon -> C***n
  hint-format: "Indice: {hint}"

# ============================================
# JEUX MATHÉMATIQUES
# ============================================
math-game:
  # Activer le jeu de mathématiques
  enabled: true
  
  # Opérations autorisées: ADD, SUBTRACT, MULTIPLY, DIVIDE
  # ADD: +
  # SUBTRACT: -
  # MULTIPLY: *
  # DIVIDE: /
  operations:
    - "ADD"
    - "SUBTRACT"
    - "MULTIPLY"
  
  # Fourchette de nombres pour les opérations
  # Le premier nombre sera entre min et max
  # Le deuxième nombre sera entre min2 et max2
  number-range:
    min: 1
    max: 50
    min2: 1
    max2: 20
  
  # Éviter les résultats négatifs?
  avoid-negative: true
  
  # Éviter les résultats décimaux?
  avoid-decimal: true
  
  # Difficulté: EASY, MEDIUM, HARD
  # EASY: ADD/SUBTRACT avec petits nombres
  # MEDIUM: Toutes opérations avec nombres moyens
  # HARD: Toutes opérations avec grands nombres
  difficulty: "MEDIUM"

# ============================================
# PARAMÈTRES GÉNÉRAUX
# ============================================
settings:
  # Temps entre chaque jeu (en secondes)
  # 300 = 5 minutes
  game-interval: 300
  
  # Temps accordé pour répondre (en secondes)
  answer-timeout: 30
  
  # Nombre de tentatives autorisées
  max-attempts: 3
  
  # Message de début de jeu
  game-start-broadcast: true
  
  # Annuler le jeu si personne ne répond après plusieurs tentatives?
  cancel-if-no-attempts: true
  
  # Messages de debug dans la console
  debug: false

# ============================================
# MESSAGES
# ============================================
messages:
  # Titre du jeu (avant le problème)
  game-title-word: "<gold>🎯 Jeu de mots!</gold>"
  game-title-math: "<gold>🧮 Jeu de math!</gold>"
  
  # Instruction
  instruction: "<gray>Trouve la réponse et tape-la dans le chat!</gray>"
  
  # Message de victoire
  # {player} = pseudo du gagnant
  # {answer} = bonne réponse
  # {reward} = récompense reçue
  victory:
    - "<green>🎉 Bravo {player}!</green> <gray>Tu as trouvé la bonne réponse: <white>{answer}</white></gray>"
    - "<green>✓ {player} a gagné!</green> <gold>+{reward} XP</gold>"
    - "<green>C'est {player} qui a trouvé!</green> <gray>La réponse était bien {answer}</gray>"
  
  # Message quand personne ne trouve
  no-winner:
    - "<red>😔 Personne n'a trouvé cette fois!</red>"
    - "<red>Personne n'a réussi...</red> <gray>La réponse était: <white>{answer}</white></gray>"
  
  # Message de mauvaise réponse
  wrong-answer:
    - "<red>❌ Mauvaise réponse {player}!</red>"
    - "<red>Ce n'est pas ça {player}!</red> <gray>Réessaie!</gray>"
  
  # Message quand les tentatives sont épuisées
  no-attempts-left:
    - "<red>😔 Plus de tentatives {player}!</red> <gray>La réponse était: <white>{answer}</white></gray>"
