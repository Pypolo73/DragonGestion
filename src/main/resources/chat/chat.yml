# DragonGestion - Configuration des messages de connexion et événements
# Utilise les placeholders: {player}, {grade}, {death_cause}, {player_killer}, {world}

# Messages de join (quand un joueur rejoint)
join:
  enabled: true
  # Message broadcast à tous les joueurs
  # Exemples: "{grade}{player} a rejoint le serveur" ou "&b{player}&r a renforcé les rangs!"
  broadcast: "<gray>{player}</gray> <green>a rejoint le serveur</green>"

# Messages de premier join (quand un joueur rejoint pour la première fois)
first_join:
  enabled: true
  broadcast: "<gradient:#D72638:#F49D37><bold>Bienvenue</bold></gradient> <gold>{player}</gold> <gray>sur le serveur!</gray>"

# Messages de quit (quand un joueur quit)
quit:
  enabled: true
  broadcast: "<gray>{player}</gray> <red>a quitté le serveur</red>"

# Messages de mort
death:
  enabled: true
  # Types de mort courants: PROJECTILE, ENTITY_ATTACK, FIRE, LAVA, DROWNING, FALL, VOID, BLOCK_EXPLOSION, ENTITY_EXPLOSION, MAGIC, SUFFOCATION, THORNS
  # Exemples de messages:
  # - "{player} est mort: {death_cause}"
  # - "{player} a été tué par {player_killer}"
  # - "{player} a été écrasé par {player_killer} (utilisant {killer_weapon})"
  broadcast: "<red>{player}</red> <gray>est mort: {death_cause}</gray>"

# Configuration des couleurs par grade (utilisées pour {grade})
grades:
  # Le grade est récupéré via %luckperms_primary_group%
  # Tu peux définir des couleurs spécifiques pour chaque grade LuckPerms
  default: "<gray>[Joueur]</gray>"
  guide: "<green>[Guide]</green>"
  moderator: "<blue>[Modo]</blue>"
  admin: "<red>[Admin]</red>"
  builder: "<aqua>[Builder]</aqua>"
  developer: "<dark_purple>[Dev]</dark_purple>"
  owner: "<gradient:#D72638:#F49D37><bold>[Fondateur]</bold></gradient>"

# Mini-jeux dans le chat (Mots cachés et Mathématiques)
chat-games:
  # Activer les mini-jeux
  enabled: true
  
  # Mode de jeu: RANDOM, WORD_ONLY, MATH_ONLY
  game-mode: RANDOM
  
  # Temps entre chaque jeu (en secondes) - 300 = 5 min
  time-between-games: 300
  
  # Temps laissé pour répondre (en secondes)
  answer-time: 30
  
  # Nombre de tentatives autorisées par joueur par jeu
  max-attempts: 3
  
  # Système de points
  points-system:
    enabled: true
    win-points: 10
    lose-points: 1
    
  # Bonus de streaks (victoires consécutives)
  streak-bonus:
    enabled: true
    multiplier-per-streak: 0.5
    max-multiplier: 3.0
    
  # Message broadcast du jeu (peut être empty pour ne rien afficher)
  announce-game: true
  
  # Récompense à utiliser (nom de la récompense dans animation.yml)
  reward: "xp_default"

  # Configuration des jeux de mots
  word-game:
    enabled: true
    # Message affiché quand un nouveau mot apparaît
    # {word} = mot caché (ex: C-h-a-r-b-o-n)
    # {hint} = indice (première et dernière lettre)
    broadcast: "<gold>🎯 Jeu de mots!</gold> <gray>Trouve le mot caché:</gray> <white>{word}</white>"

  # Configuration des jeux mathématiques
  math-game:
    enabled: true
    # Message affiché pour l'opération
    # {problem} = l'opération (ex: 45 + 27 = ?)
    broadcast: "<gold>🧮 Jeu mathématique!</gold> <gray>Résouds l'opération:</gray> <white>{problem}</white>"

  # Message de victoire
  winner-message: "<green>🎉 Bravo {player}!</green> <gray>Tu as trouvé la bonne réponse!</gray> <gold>+{reward}</gold>"

  # Message d'échec (quand personne n'a trouvé)
  no-winner-message: "<red>😔 Personnes n'a trouvé la réponse!</red> <gray>La réponse était:</gray> <white>{answer}</white>"

  # Message quand le joueur se trompe
  wrong-answer: "<red>❌ Mauvaise réponse {player}!</red> <gray>Il te reste {attempts} tentatives.</gray>"
