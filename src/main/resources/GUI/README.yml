# AdminCore - Configuration des GUIs
# Ce dossier contient les configurations des interfaces graphiques

# ============================================
# STRUCTURE DES GUIs
# ============================================
# Chaque fichier YAML représente un GUI différent.
# Les GUIs peuvent utiliser:
# - DeluxeMenus (format: https://github.com/Blast-MC/DeluxeMenus/wiki)
# - ItemAdder (format natif)
# - GUIs custom du plugin

# ============================================
# GUIs DISPONIBLES
# ============================================
# - staff_menu.yml    : Menu principal staff (/staff)
# - teleport_menu.yml: Menu de téléportation (/teleportation)
# - lookup_menu.yml   : Menu de recherche joueur (/lookup)
# - ticket_menu.yml  : Menu des tickets
# - sanction_menu.yml : Menu des sanctions
# - home_menu.yml    : Menu des homes
# - warp_menu.yml    : Menu des warps

# ============================================
# ITEMADDER INTEGRATION
# ============================================
# Le plugin supporte ItemAdder pour les items personnalisés.
# Si ItemAdder est installé, les GUIs peuvent utiliser
# des items custom définis dans ItemAdder.
# 
# Pour utiliser un item ItemAdder dans un GUI:
#   item: "namespace:item_name"
#
# Exemple:
#   item: "mythic_items:epic_sword"

# ============================================
# EXEMPLE DE CONFIGURATION
# ============================================
# Example:
# gui_name: "Mon Menu"
# type: "DELUXEMENUS"  # ou "ITEMADDER" ou "CUSTOM"
# menu_settings:
#   title: "Mon Titre"
#   size: 27
# items:
#   1:
#     material: "DIAMOND_SWORD"
#     name: "&bEpée"
#     lore:
#       - "&7Cliquez pour équiper"
#     command: "equip sword"
#   2:
#     material: "GOLDEN_APPLE"
#     name: "&6Potion"
#     count: 5

# ============================================
# COMPATIBILITÉ
# ============================================
# Le plugin 检测 automatiquement:
# - Si DeluxeMenus est installé: utilise son format
# - Si ItemAdder est installé: peut utiliser ses items
# - Sinon: utilise les GUIs built-in

# Note: Ce fichier est une documentation.
# Les GUIs réels sont générés ou configurés ailleurs.
